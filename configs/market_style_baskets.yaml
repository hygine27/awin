# 大风格篮子定义。
# 这份配置回答的问题是：
# 1. 市场当前主要在用什么“大框架”给股票定价。
# 2. awin 应该如何把 5000+ 股票先归入几个可解释的大风格。
#
# 这一层是“慢变量层”。
# 它不是今天最热的题材，也不是盘中涨得最快的概念。
# 它更接近“季节”，用于回答：
# - 当前偏价值还是偏成长
# - 当前偏防御还是偏进攻
# - 当前偏权重大票还是偏中小盘活跃
#
# 当前版本已经从“纯行业篮子”升级为“行业 + 板块 + 慢变量 selector”的组合定义。
# selector 来源主要包括：
# - stock_master: market / industry
# - style_profile: ownership_style / size_bucket_abs / size_bucket_pct / capacity_bucket
#
# 每个风格篮子支持的 selector：
# - industries: 基础行业口径
# - market_types: 主板 / 创业板 / 科创板 / 北交所
# - ownership_styles: 央国企 / 民企 / 混合属性 / 未识别
# - size_bucket_abs_in: 超大盘 / 大盘 / 中盘 / 小盘 / 微盘
# - size_bucket_pct_in: 超大盘 / 大盘 / 中盘 / 小盘 / 微盘
# - capacity_bucket_in: 机构核心容量 / 机构可做容量 / 中小票 / 微盘弹性
# - composite_labels: style_profile 里已经派生好的复合标签
# - match_mode:
#   - any: 任一 selector 命中即可入篮子
#   - all: 所有已配置 selector 都必须同时命中
style_baskets:
  科技成长:
    # 用途：
    # - 识别市场是否愿意为高估值成长和科技弹性买单
    # 当前逻辑：
    # - 创业板 / 科创板是成长市场层次代理
    # - 软件、半导体、通信、IT 是科技行业代理
    match_mode: any
    market_types: [创业板, 科创板]
    industries: [软件服务, 互联网, IT设备, 通信设备, 半导体, 元器件, 电器仪表]

  红利价值:
    # 用途：
    # - 识别低估值、高股息、稳定现金流和机构容量资产是否占优
    # 当前逻辑：
    # - 行业偏银行、公用事业、能源、港口电信等高分红领域
    # - 同时要求具备机构容量
    match_mode: all
    industries: [银行, 煤炭开采, 石油开采, 石油加工, 火力发电, 水力发电, 新型电力, 供气供热, 港口, 水运, 公路, 电信运营]
    capacity_bucket_in: [机构核心容量, 机构可做容量]

  顺周期资源:
    # 用途：
    # - 识别商品涨价、经济修复、顺周期扩张风格
    match_mode: any
    industries: [化工原料, 小金属, 铜, 铝, 普钢, 特种钢, 钢加工, 水泥, 玻璃, 工程机械, 化纤, 矿物制品, 黄金, 铅锌, 焦炭加工]

  消费医药防御:
    # 用途：
    # - 识别消费白马、家电、食品饮料、医药服务等防御配置风格
    match_mode: any
    industries: [食品, 白酒, 红黄酒, 啤酒, 乳制品, 家用电器, 百货, 超市连锁, 旅游景点, 旅游服务, 酒店餐饮, 服饰, 中成药, 化学制药, 生物制药, 医疗保健, 医药商业]

  金融地产链:
    # 用途：
    # - 识别银行、券商、保险、地产和建筑链的权重修复风格
    match_mode: any
    industries: [保险, 证券, 多元金融, 全国地产, 区域地产, 园区开发, 房产服务, 建筑工程, 其他建材, 装修装饰]
    composite_labels: [金融地产链]

  小盘题材:
    # 用途：
    # - 识别市场是否偏向微盘弹性和题材活跃
    # 当前逻辑：
    # - 同时要求相对小盘或微盘
    # - 且容量标签属于中小票 / 微盘弹性
    match_mode: all
    size_bucket_pct_in: [小盘, 微盘]
    capacity_bucket_in: [中小票, 微盘弹性]

  央国企权重:
    # 用途：
    # - 识别央国企大盘权重是否成为主要定价框架
    match_mode: all
    ownership_styles: [央国企]
    capacity_bucket_in: [机构核心容量, 机构可做容量]

  高弹性进攻:
    # 用途：
    # - 识别成长板块中的高弹性进攻风格
    # 当前逻辑：
    # - 创业板 / 科创板
    # - 且容量偏中小票或微盘弹性
    match_mode: all
    market_types: [创业板, 科创板]
    capacity_bucket_in: [中小票, 微盘弹性]

# 风格层的截面阈值。
# 这组参数控制：
# - 一个风格篮子最少需要多少成分才算“有统计意义”
# - 什么叫“强上涨”
# - 什么叫“日内位置偏强”
# - 什么叫“量能活跃”
thresholds:
  # min_constituents:
  # - 作用：风格篮子最少成分股数量
  # - 单位：只
  # - 当前值 12 的含义：少于 12 只时，不认为这个风格篮子的统计结果稳定
  min_constituents: 12
  # strong_move_pct:
  # - 作用：定义“强势上涨股票”的涨幅门槛
  # - 单位：相对昨收涨跌幅，小数表示，0.02 = +2%
  # - 用途：计算 strong_ratio
  strong_move_pct: 0.02
  # near_high_threshold:
  # - 作用：定义“日内位置靠近高点”的门槛
  # - 单位：0~1 的振幅区间位置，0.8 = 位于日内振幅上方 20% 区域
  # - 用途：计算 near_high_ratio
  near_high_threshold: 0.8
  # active_pace_threshold:
  # - 作用：定义“量能/节奏活跃”的门槛
  # - 单位：量比倍数，1.2 = 高于近期常态 20%
  # - 用途：计算 activity_ratio
  active_pace_threshold: 1.2

# 风格综合分权重。
# 这组参数控制“风格综合分”里每个维度的相对重要性。
# 所有权重加总建议接近 1.0，便于业务直观理解。
score_weights:
  # eq_return:
  # - 作用：风格篮子等权平均涨幅权重
  # - 含义：更重视这个风格整体当天涨得是否真的更强
  eq_return: 0.4
  # up_ratio:
  # - 作用：上涨家数占比权重
  # - 含义：更重视“是不是大面积普涨”，而不是少数股票拉动
  up_ratio: 0.2
  # strong_ratio:
  # - 作用：强势上涨股票占比权重
  # - 含义：更重视这个风格里有没有足够多的强势股票
  strong_ratio: 0.15
  # near_high_ratio:
  # - 作用：日内位置靠近高点的股票占比权重
  # - 含义：更重视尾盘/当前时点是否仍维持强势，而不是冲高回落
  near_high_ratio: 0.15
  # activity_ratio:
  # - 作用：量能活跃股票占比权重
  # - 含义：更重视这个风格是否有持续交易和资金参与
  activity_ratio: 0.1
