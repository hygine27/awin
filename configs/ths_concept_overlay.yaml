# 不纳入盘中主线解释的概念及原因。
# 作用：
# - 明确哪些 THS 标签虽然常见，但不适合作为“主线解释变量”
# - 必须给出剔除原因，便于业务 review
concept_blacklist:
  ST板块: 风险处置 / 壳属性主导，不能代表健康市场主线。
  融资融券: 交易制度标签，不是主题。
  沪股通: 通道/成分标签，不是主题。
  深股通: 通道/成分标签，不是主题。
  中证500成份股: 指数成分标签，不是主题。
  沪深300样本股: 指数成分标签，不是主题。
  高股息精选: 风格属性过于宏观，放在主风格层而非概念层。
  国企改革: 覆盖过宽，解释力偏弱。
  央企国企改革: 覆盖过宽，解释力偏弱。
  专精特新: 覆盖过宽，容易和成长泛化标签重复。
  华为概念: 映射过宽、跨行业过强，容易稀释盘中解释。
  比亚迪概念: 单公司辐射型概念，泛化过度。
  阿里巴巴概念: 平台映射过宽。
  腾讯概念: 平台映射过宽。
  小米概念: 平台映射过宽。
  一带一路: 政策/地域叙事过宽，不适合作为盘中风切解释主轴。
  西部大开发: 区域主题，不适合作为主交易概念。
  粤港澳大湾区: 区域主题，不适合作为主交易概念。
  京津冀一体化: 区域主题，不适合作为主交易概念。
  海峡两岸: 区域主题，不适合作为主交易概念。
  股权转让(并购重组): 事件驱动过散。
  回购增持再贷款概念: 政策资金概念，持续性和行业归因较弱。
  2025年报预增: 财报时点标签，不是稳定主题。
  2025中报预增: 财报时点标签，不是稳定主题。
  电子商务: 覆盖过宽，噪音大。
  创投: 事件/风口标签，稳定性差。
  乡村振兴: 政策外延过宽。

# 允许保留但需要降权的概念。
# 作用：
# - 这些概念不是绝对错误，但解释纯度偏弱
# - 保留是为了不漏掉链条信息，降权是为了避免它们压过更纯的主概念
concept_downweight:
  数据中心:
    weight: 0.72
    reason: 与算力主链高度重合，保留但降权。
  AI应用:
    weight: 0.82
    reason: 应用层外延较大，强度可参考但不宜压过基础设施链。
  AIGC概念:
    weight: 0.78
    reason: 叙事较宽，和 AI 应用/智能体存在重合。
  PCB概念:
    weight: 0.8
    reason: 既服务光模块链，也服务泛电子，纯度略弱。
  芯片概念:
    weight: 0.68
    reason: 半导体母概念过宽，优先看更窄子概念。
  机器人概念:
    weight: 0.7
    reason: 覆盖面过宽，优先看人形/减速器/机器视觉。
  PEEK材料:
    weight: 0.78
    reason: 更像机器人链的材料支线，热度波动大。
  高端装备:
    weight: 0.82
    reason: 制造业升级母概念较宽，建议结合工业母机和新型工业化一起确认主线纯度。
  工业互联网:
    weight: 0.84
    reason: 横跨软件、设备和制造流程，覆盖面较宽，适合作为高端制造的辅助验证概念。
  新型工业化:
    weight: 0.84
    reason: 政策属性较强、外延偏宽，保留但不宜压过更纯的装备类概念。
  消费电子概念:
    weight: 0.76
    reason: 母概念较宽，建议优先看苹果链、AI手机、AI PC、无线耳机等更具体方向。
  智能座舱:
    weight: 0.78
    reason: 仍属于汽车智能化链，但相对无人驾驶和车联网更偏座舱应用层，适合作为辅助验证概念。
  锂电池概念:
    weight: 0.74
    reason: 锂电子概念覆盖面过宽，建议优先看固态电池、钠离子电池、换电和回收等更细分支。
  储能:
    weight: 0.9
    reason: 作为独立元主题应保留较强解释力；仅因覆盖电芯、系统集成和应用场景较宽，做轻微降权以避免压过更细分的链条概念。
  绿色电力:
    weight: 0.86
    reason: 电力运营母概念较宽，建议结合水利和政策催化概念一起确认，而不是单独放大。
  商业航天:
    weight: 0.88
    reason: 可用，但需和卫星导航/军工信息化交叉验证。
  低空经济:
    weight: 0.78
    reason: 外延宽、题材波动大，建议配合飞行汽车/无人机一起看。
  卫星导航:
    weight: 0.84
    reason: 兼具军工与导航属性，主线纯度中等。
  无人机:
    weight: 0.8
    reason: 与低空、军工、机器人均有交叉，保留但降权。
  军工:
    weight: 0.8
    reason: 军工母概念覆盖面较宽，建议结合大飞机、航空发动机和军工信息化判断真实主攻方向。
  互联网金融:
    weight: 0.82
    reason: 覆盖金融业务与交易平台较宽，建议优先看证券主线，并结合金融科技交叉验证。

