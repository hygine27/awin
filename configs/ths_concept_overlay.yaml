# 题材/概念解释层配置。
# 这份配置回答的问题是：
# 1. 盘中“钱在打什么主线”？
# 2. 不同概念之间，哪些应该被归并到一条更高层的交易主线？
# 3. 哪些概念噪音太大，应该降权或直接排除？
#
# 这里使用的“概念”来源于同花顺概念体系（THS concepts）。
# 具体来说，当前 awin 在这一层依赖两类 THS 来源：
# 1. THS 概念成分映射：
#    - 用途：回答“某只股票属于哪些概念”
#    - 当前接入形式：concept_to_stocks 映射文件
# 2. THS 热概念榜 / 客户端概念榜：
#    - 用途：回答“此刻哪些概念最热、在加速、在吸引资金”
#    - 当前接入形式：THS app / cli 热概念快照
#
# 这里的核心概念有三层：
# - 风格：市场的大定价框架，比如科技成长、红利价值
# - 元主题：盘中主攻线的聚合层，把多个近义概念合并成一条可交易主线
# - 概念：THS 具体标签，是最细颗粒度的盘中题材标签
#
# 元主题不是行业分类，也不是长期研究分类。
# 它的用途是：把“概念噪音”压缩成业务可读的主线结论。
# 例如：
# - 共封装光学(CPO)、F5G、铜缆高速连接 可以共同归为 光通信_CPO
# - AI智能体、液冷服务器、算力租赁 可以共同归为 AI算力
#
# 当前版本是“第一阶段监控白名单”：
# - 目标不是覆盖全部 A 股概念，而是覆盖大部分“盘中可交易主线类型”
# - 这里的“覆盖”指主线类型覆盖，不是股票数量覆盖
# - 当前已从纯科技子集扩到科技、金融、资源、医药、消费电子、电力设备等主线
# - 仍然不代表全市场完整主线字典
# - 后续还会继续补消费服务修复、地产链细分、化工新材料、汽车智能化等方向
#
# 当前被哪些模块使用：
# - market_understanding:
#   用于把细概念聚合成“主攻线/元主题”，并叠加热度、加速、资金等解释信号
# - opportunity_discovery:
#   用于判断个股是否与当前主线一致，以及是否属于主概念/次级概念
# - risk_surveillance:
#   用于判断一只票是否在强主题内部已经过热，或已经明显掉队
version: v1.1

positioning:
  # role:
  # - 作用：说明这份配置在系统中的定位
  role: market_concept_overlay
  # description:
  # - 作用：明确 THS 概念只用于盘中交易解释，不用于定义公司长期本质
  description: THS 概念只用于解释市场当下如何给股票贴交易标签、如何形成概念扩散与风切，不作为公司长期标签真相。
  # join_key:
  # - 作用：说明概念映射与个股主数据对齐时使用的主键口径
  join_key: stock_code_without_suffix

# 概念层聚合阈值与榜单权重。
# 这组参数控制：
# - 概念最少需要多少只股票才参与统计
# - 股票层信号和板块榜单信号如何加权
# - 最终报告展示多少概念和多少元主题
thresholds:
  # min_members:
  # - 作用：概念参与统计的最小成分股数量
  # - 单位：只
  min_members: 8
  # stock_score_weight:
  # - 作用：概念综合分中，股票截面统计的权重
  # - 含义：越高，越依赖成分股真实表现
  stock_score_weight: 0.78
  # board_score_weight:
  # - 作用：概念综合分中，THS 热榜/板块榜单信号的权重
  # - 含义：越高，越依赖客户端/APP 热度与资金榜单
  board_score_weight: 0.22
  # meta_theme_top_concepts:
  # - 作用：每个元主题最多取前多少个概念来代表这条主线
  # - 单位：个
  meta_theme_top_concepts: 3
  # top_concepts_in_report:
  # - 作用：业务摘要中最多展示多少个最强概念
  # - 单位：个
  top_concepts_in_report: 10
  # top_meta_themes_in_report:
  # - 作用：业务摘要中最多展示多少条元主题
  # - 单位：条
  top_meta_themes_in_report: 6
  # min_explain_score:
  # - 作用：低于该分数的概念，不作为重点解释对象
  # - 单位：0~1 的综合分
  min_explain_score: 0.56

# 元主题定义。
# 每个 key 是一条“盘中主攻线”的聚合标签。
# 每个 value 是会被并到这条主线下的 THS 细概念。
# 这些概念之间不要求完全同义，但需要在交易上有较强共振关系。
#
# 第一阶段元主题设计原则：
# 1. 优先覆盖大多数“可交易主线类型”，不追求覆盖全部概念。
# 2. 元主题之间尽量边界清晰，避免把两条不同交易逻辑揉成一条。
# 3. 同一只股票可以命中多个元主题，但运行时应区分 primary 和 secondary：
#    - primary：更能解释当下资金主攻方向的主归属
#    - secondary：允许作为辅助归属存在，但不应在主线热度里双重计数
#
# 第一阶段重点边界约定：
# - 光通信_CPO 保持独立，不并入 AI算力。
#   原因：在 A 股盘中交易中，CPO/光模块/铜缆/F5G 经常形成独立主线。
# - 华为生态 保持独立，不直接并入 AI算力、信创自主可控或消费电子供应链。
#   原因：鸿蒙 / 鲲鹏 / 昇腾 / 海思等方向在盘中经常以“华为链”被独立交易。
# - 数据要素 不等于 信创。
#   原因：数据要素更偏数据确权、流通、交易、政务数据应用；信创更偏国产 IT 软硬件替代。
#   两者成分股有较高重叠，因此后续必须依赖 primary/secondary 规则避免双重计数。
# - 工业金属 与 锂电 必须按“资源开采侧 vs 材料/应用侧”区分。
#   原因：锂矿/钴矿等资源端可归工业金属；电池材料、电芯、回收、设备、应用链归锂电。
# - 光伏风电 当前保留为独立元主题，但其主驱动逻辑更接近景气周期、价格和出口，
#   不是核电设备或电网资本开支逻辑。
# - 绿色电力 与 光伏风电 / 储能 / 电网设备 不应混为一条。
#   原因：绿色电力更偏电力运营、公用事业弹性和政策催化，不是设备制造链。
# - 军工大装备 与 商业航天低空 不应合并。
#   原因：前者更偏军工订单、装备升级和大装备链，后者更偏成长题材和低空经济叙事。
meta_themes:
  # AI算力:
  # - 用途：聚合数据中心、算力租赁、液冷、AI应用基础设施等概念
  # - 业务含义：市场在交易 AI 基础设施和算力资源供给
  AI算力: [东数西算(算力), 算力租赁, 液冷服务器, 数据中心, AI智能体, AI应用, AIGC概念]
  # 华为生态:
  # - 用途：聚合鸿蒙、鲲鹏、昇腾、海思等华为生态链方向
  # - 业务含义：市场在交易华为产业链扩散、生态建设和国产替代协同
  华为生态: [鸿蒙概念, 华为鲲鹏, 华为昇腾, 华为手机, 华为海思概念股]
  # 光通信_CPO:
  # - 用途：聚合光模块、铜缆、F5G 等高速互连链条
  # - 业务含义：市场在交易 AI 通信和高速连接
  光通信_CPO: [共封装光学(CPO), 铜缆高速连接, F5G概念, 光纤概念, PCB概念]
  # 半导体:
  # - 用途：聚合存储、先进封装、三代半导体、MCU 等芯片方向
  # - 业务含义：市场在交易芯片制造、封装、国产替代
  半导体: [存储芯片, 先进封装, 第三代半导体, MCU芯片, 芯片概念]
  # 信创自主可控:
  # - 用途：聚合信创、国产软件、国产操作系统、网络安全等自主可控方向
  # - 业务含义：市场在交易政企 IT 国产替代、自主软硬件体系建设
  信创自主可控: [信创, 国产操作系统, 网络安全, 数据安全]
  # 数据要素:
  # - 用途：聚合数据确权、流通、交易与政务/行业数据应用方向
  # - 业务含义：市场在交易数据资源化和数据流通制度建设
  数据要素: [数据要素, 数据确权]
  # 消费电子供应链:
  # - 用途：聚合消费电子、苹果链、AI 终端、无线耳机等终端供应链方向
  # - 业务含义：市场在交易终端创新、品牌链条和电子景气修复
  消费电子供应链: [消费电子概念, 苹果概念, 无线耳机, AI手机, AI PC]
  # 机器人:
  # - 用途：聚合人形机器人及关键零部件
  # - 业务含义：市场在交易机器人产业链和相关材料/部件
  机器人: [人形机器人, 机器人概念, 减速器, 机器视觉, PEEK材料]
  # 高端制造:
  # - 用途：聚合高端装备、工业互联网、工业母机和新型工业化方向
  # - 业务含义：市场在交易制造业升级、设备更新和工业资本开支
  高端制造: [高端装备, 工业互联网, 新型工业化, 工业母机]
  # 汽车智能化:
  # - 用途：聚合无人驾驶、车联网、智能汽车、高压快充等智能汽车方向
  # - 业务含义：市场在交易智驾渗透、车载电子和智能汽车产业升级
  汽车智能化: [无人驾驶, 车联网(车路协同), 高压快充, 智能座舱]
  # 锂电:
  # - 用途：聚合锂电池、电池材料、固态电池、钠电、换电和回收等电池链方向
  # - 业务含义：市场在交易动力电池与储能电池产业链
  锂电: [锂电池概念, 固态电池, 钠离子电池, 换电概念, 动力电池回收]
  # 储能:
  # - 用途：聚合储能系统、储能应用和与储能相关的独立概念
  # - 业务含义：市场在交易储能建设和新型储能应用
  储能: [储能]
  # 电网设备:
  # - 用途：聚合智能电网、特高压、虚拟电厂等电网基础设施方向
  # - 业务含义：市场在交易电网投资和输配电设备建设
  电网设备: [智能电网, 特高压, 虚拟电厂]
  # 核电设备:
  # - 用途：聚合核电建设和核电设备方向
  # - 业务含义：市场在交易核电资本开支和装备更新
  核电设备: [核电]
  # 绿色电力:
  # - 用途：聚合绿色电力、水利和水电政策催化方向
  # - 业务含义：市场在交易电力运营重估、公用事业弹性和政策驱动型电力主题
  绿色电力: [绿色电力, 水利, 雅下水电概念]
  # 光伏风电:
  # - 用途：聚合光伏、风电及其设备链方向
  # - 业务含义：市场在交易新能源发电景气、价格和出口逻辑
  光伏风电: [光伏概念, 风电]
  # 创新药:
  # - 用途：聚合创新药、CXO、减肥药等医药活跃方向
  # - 业务含义：市场在交易新药研发、出海授权和医药风险偏好回升
  创新药: [创新药, CRO概念, 减肥药]
  # 医疗器械:
  # - 用途：聚合医疗器械和医用设备方向
  # - 业务含义：市场在交易医疗设备升级和器械国产替代
  医疗器械: [医疗器械概念]
  # 黄金贵金属:
  # - 用途：聚合黄金及贵金属方向
  # - 业务含义：市场在交易避险、美元和贵金属价格逻辑
  黄金贵金属: [黄金概念]
  # 工业金属:
  # - 用途：聚合铜、铝、稀有金属、小金属等资源开采与冶炼方向
  # - 业务含义：市场在交易工业金属价格和资源品周期
  工业金属: [小金属概念, 金属铜, 金属镍, 金属锌, 金属铅]
  # 券商互金:
  # - 用途：聚合互联网金融和参股券商等交易型金融代理概念
  # - 业务含义：在 THS 概念层缺少纯券商主概念时，先用可落地的交易型金融概念代理成交回升和风险偏好上行
  券商互金: [互联网金融, 参股券商]
  # 商业航天低空:
  # - 用途：聚合商业航天、低空经济、卫星导航、飞行汽车等概念
  # - 业务含义：市场在交易低空经济和商业航天成长主题
  商业航天低空: [商业航天, 低空经济, 卫星导航, 飞行汽车(eVTOL), 无人机]
  # 军工大装备:
  # - 用途：聚合军工、军工信息化、大飞机、航空发动机和海工装备方向
  # - 业务含义：市场在交易军工订单、装备升级和大装备产业链
  军工大装备: [军工, 军工信息化, 大飞机, 航空发动机, 海工装备]

# 允许进入解释层的概念白名单。
