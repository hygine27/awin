# 大风格篮子定义。
# 用于 market_understanding 将全市场股票映射到可解释的风格分组。
style_baskets:
  科技成长:
    # 以成长板块和科技行业为主。
    market_types: [创业板, 科创板]
    industries: [软件服务, 互联网, IT设备, 通信设备, 半导体, 元器件, 电器仪表]

  红利价值:
    # 偏高股息、稳现金流、公用事业和运营类资产。
    industries: [银行, 煤炭开采, 石油开采, 石油加工, 火力发电, 水力发电, 新型电力, 供气供热, 港口, 水运, 公路, 电信运营]

  顺周期资源:
    # 资源品、材料、工程机械等顺周期方向。
    industries: [化工原料, 小金属, 铜, 铝, 普钢, 特种钢, 钢加工, 水泥, 玻璃, 工程机械, 化纤, 矿物制品, 黄金, 铅锌, 焦炭加工]

  消费防御:
    industries: [食品, 白酒, 红黄酒, 啤酒, 乳制品, 家用电器, 百货, 超市连锁, 旅游景点, 旅游服务, 酒店餐饮, 服饰]

  医药防御:
    industries: [中成药, 化学制药, 生物制药, 医疗保健, 医药商业]

  金融地产链:
    industries: [保险, 证券, 多元金融, 全国地产, 区域地产, 园区开发, 房产服务, 建筑工程, 其他建材, 装修装饰]

# 风格层的截面阈值。
thresholds:
  min_constituents: 12
  strong_move_pct: 0.02
  near_high_threshold: 0.8
  active_pace_threshold: 1.2

# 风格综合分权重。
score_weights:
  eq_return: 0.4
  up_ratio: 0.2
  strong_ratio: 0.15
  near_high_ratio: 0.15
  activity_ratio: 0.1
