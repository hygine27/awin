version: v1.1

positioning:
  role: market_concept_overlay
  description: THS 概念只用于解释市场当下如何给股票贴交易标签、如何形成概念扩散与风切，不作为公司长期标签真相。
  join_key: stock_code_without_suffix

# 概念层聚合阈值与榜单权重。
thresholds:
  min_members: 8
  stock_score_weight: 0.78
  board_score_weight: 0.22
  meta_theme_top_concepts: 3
  top_concepts_in_report: 10
  top_meta_themes_in_report: 6
  min_explain_score: 0.56

# 元主题定义。
meta_themes:
  AI算力: [东数西算(算力), 算力租赁, 液冷服务器, 数据中心, AI智能体, AI应用, AIGC概念]
  光通信_CPO: [共封装光学(CPO), 铜缆高速连接, F5G概念, 光纤概念, PCB概念]
  半导体: [存储芯片, 先进封装, 第三代半导体, MCU芯片, 芯片概念]
  机器人: [人形机器人, 机器人概念, 减速器, 机器视觉, PEEK材料]
  电网储能: [智能电网, 特高压, 虚拟电厂, 绿色电力, 储能]
  商业航天低空: [商业航天, 低空经济, 卫星导航, 军工信息化, 飞行汽车(eVTOL), 无人机]

