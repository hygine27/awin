# 不纳入盘中主线解释的概念及原因。
concept_blacklist:
  ST板块: 风险处置 / 壳属性主导，不能代表健康市场主线。
  融资融券: 交易制度标签，不是主题。
  沪股通: 通道/成分标签，不是主题。
  深股通: 通道/成分标签，不是主题。
  中证500成份股: 指数成分标签，不是主题。
  沪深300样本股: 指数成分标签，不是主题。
  高股息精选: 风格属性过于宏观，放在主风格层而非概念层。
  国企改革: 覆盖过宽，解释力偏弱。
  央企国企改革: 覆盖过宽，解释力偏弱。
  专精特新: 覆盖过宽，容易和成长泛化标签重复。
  华为概念: 映射过宽、跨行业过强，容易稀释盘中解释。
  比亚迪概念: 单公司辐射型概念，泛化过度。
  阿里巴巴概念: 平台映射过宽。
  腾讯概念: 平台映射过宽。
  小米概念: 平台映射过宽。
  一带一路: 政策/地域叙事过宽，不适合作为盘中风切解释主轴。
  西部大开发: 区域主题，不适合作为主交易概念。
  粤港澳大湾区: 区域主题，不适合作为主交易概念。
  京津冀一体化: 区域主题，不适合作为主交易概念。
  海峡两岸: 区域主题，不适合作为主交易概念。
  股权转让(并购重组): 事件驱动过散。
  回购增持再贷款概念: 政策资金概念，持续性和行业归因较弱。
  2025年报预增: 财报时点标签，不是稳定主题。
  2025中报预增: 财报时点标签，不是稳定主题。
  电子商务: 覆盖过宽，噪音大。
  创投: 事件/风口标签，稳定性差。
  乡村振兴: 政策外延过宽。

# 允许保留但需要降权的概念。
concept_downweight:
  数据中心:
    weight: 0.72
    reason: 与算力主链高度重合，保留但降权。
  AI应用:
    weight: 0.82
    reason: 应用层外延较大，强度可参考但不宜压过基础设施链。
  AIGC概念:
    weight: 0.78
    reason: 叙事较宽，和 AI 应用/智能体存在重合。
  PCB概念:
    weight: 0.8
    reason: 既服务光模块链，也服务泛电子，纯度略弱。
  芯片概念:
    weight: 0.68
    reason: 半导体母概念过宽，优先看更窄子概念。
  机器人概念:
    weight: 0.7
    reason: 覆盖面过宽，优先看人形/减速器/机器视觉。
  PEEK材料:
    weight: 0.78
    reason: 更像机器人链的材料支线，热度波动大。
  绿色电力:
    weight: 0.72
    reason: 容易和公用事业/新能源混合，不宜过度放大。
  储能:
    weight: 0.66
    reason: 范围较大，建议更关注智能电网/特高压/虚拟电厂。
  商业航天:
    weight: 0.88
    reason: 可用，但需和卫星导航/军工信息化交叉验证。
  低空经济:
    weight: 0.78
    reason: 外延宽、题材波动大，建议配合飞行汽车/无人机一起看。
  卫星导航:
    weight: 0.84
    reason: 兼具军工与导航属性，主线纯度中等。
  无人机:
    weight: 0.8
    reason: 与低空、军工、机器人均有交叉，保留但降权。

